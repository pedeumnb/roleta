<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roleta Dia do Hambúrguer 🍔</title>

<style>

/* =====================================
   ===== BACKGROUND PERSONALIZÁVEL =====
   ===================================== */
#background {
  position: fixed;
  inset: 0;
  background: url('https://imgur.com/.png') center/cover no-repeat;
  z-index: -1;
}

/* Cor fallback caso a imagem não carregue */
:root {
  --bg-hex: #1a1a1a;
}

/* ===== CONFIGURAÇÃO GERAL ===== */
body {
  margin: 0;
  color: #fff;
  font-family: 'Poppins', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  overflow: hidden;
}

/* ===== LOGO ===== */
#logo {
  width: 220px;
  margin-bottom: 10px;
}

/* ===== TÍTULO ===== */
#title {
  font-size: 34px;
  font-weight: bold;
  margin-bottom: 15px;
  color: #ffcc00;
  text-shadow: 0 0 12px #ff9800;
  text-align: center;
}

/* ===== ROLETA ===== */
#wheel-container {
  position: relative;
  width: 320px;
  height: 320px;
}

.wheel {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  border: 6px solid #ffcc00;
  box-shadow: 0 0 30px #ff9800aa;
  transition: transform 5s cubic-bezier(0.33,1,0.68,1);
  position: relative;
  overflow: hidden;
}

.slice-text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform-origin: 0 0;
  font-size: 32px;
  color: #fff;
  pointer-events: none;
  text-shadow: 0 0 8px rgba(0,0,0,0.9);
}

.pointer {
  position: absolute;
  top: -8px;
  left: 50%;
  transform: translateX(-50%);
  width: 0;
  height: 0;
  border-left: 12px solid transparent;
  border-right: 12px solid transparent;
  border-top: 20px solid #ffcc00;
  z-index: 10;
  filter: drop-shadow(0 0 5px #ff9800);
}

/* ===== BOTÃO ===== */
button {
  margin-top: 20px;
  padding: 14px 28px;
  font-size: 17px;
  background: linear-gradient(45deg,#ff9800,#d84315);
  border: none;
  border-radius: 50px;
  color: #fff;
  cursor: pointer;
  transition: 0.3s;
  box-shadow: 0 0 15px #ff9800aa;
  font-weight: bold;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px #ff9800;
}

/* ===== MENSAGEM ===== */
#prize-message {
  margin-top: 15px;
  font-size: 26px;
  font-weight: bold;
  color: #ffcc00;
  text-shadow: 0 0 10px #ff9800;
  display: none;
  text-align: center;
}

/* ===== RESPONSIVO ===== */
@media (max-width:500px){

  #wheel-container{
    width:270px;
    height:270px;
  }

  .slice-text{
    font-size:36px;
  }

  button{
    font-size:15px;
    padding:10px 20px;
  }

  #prize-message{
    font-size:22px;
  }

  #title{
    font-size:28px;
  }
}
</style>
</head>

<body>

<!-- BACKGROUND -->
<div id="background"></div>

<!-- LOGO -->
<img id="logo" src="https://ibb.co/MkyJtjLZ.jpg" alt="Logo">

<!-- TÍTULO -->
<div id="title">
  🍔 Dia do Hambúrguer 🍔
</div>

<!-- ROLETA -->
<div id="wheel-container">
  <div class="pointer"></div>
  <div class="wheel" id="wheel"></div>
</div>

<!-- BOTÃO -->
<button id="spin">
  🍟 Girar Roleta
</button>

<!-- MENSAGEM -->
<div id="prize-message">
  📸 Tire um print e envie no nosso WhatsApp 🍔
</div>

<script>

const wheel = document.getElementById("wheel");
const spinBtn = document.getElementById("spin");
const prizeMessage = document.getElementById("prize-message");

/* 🎯 PRÊMIOS TEMA HAMBÚRGUER */
const prizes = [
  { text: "🍔", color: "#ff9800" },
  { text: "🍟", color: "#ff5722" },
  { text: "🥤", color: "#ff7043" },
  { text: "🌭", color: "#d84315" },
  { text: "🧀", color: "#ffb300" },
  { text: "🍗", color: "#f57c00" },
  { text: "🥓", color: "#ff9800" },
  { text: "🍕", color: "#e65100" },
  { text: "🌮", color: "#ffa726" },
  { text: "🍩", color: "#bf360c" }
];

const spinDurationMs = 5200;
const sliceAngle = 360 / prizes.length;

/* 🔁 SALVAMENTO */
let currentRotation =
parseFloat(localStorage.getItem("roleta_hamburguer_angulo")) || 0;

/* Fundo colorido */
wheel.style.background = `conic-gradient(${
  prizes.map((p,i)=>
    `${p.color} ${i*sliceAngle}deg ${(i+1)*sliceAngle}deg`
  ).join(",")
})`;

/* Cria os emojis */
function createSlices() {

  const wheelSize = wheel.offsetWidth;

  let radius = wheelSize / 2 - 50;

  if (wheelSize < 300) {
    radius = wheelSize / 2 - 20;
  }

  prizes.forEach((p,i)=>{

    const div = document.createElement("div");

    div.className = "slice-text";
    div.textContent = p.text;

    const angle =
    (i * sliceAngle + sliceAngle / 2) * Math.PI / 180;

    const x = radius * Math.cos(angle);
    const y = radius * Math.sin(angle);

    div.style.transform =
    `translate(${x}px,${y}px)
     rotate(${i*sliceAngle + sliceAngle/2 + 90}deg)`;

    wheel.appendChild(div);

  });
}

createSlices();

/* Mantém posição após reload */
wheel.style.transform = `rotate(${currentRotation}deg)`;

/* Controle */
let isSpinning = false;

let hasSpun =
localStorage.getItem("roleta_hamburguer_girada") === "true";

/* Se já girou */
if(hasSpun){

  spinBtn.disabled = true;
  spinBtn.style.opacity = 0.5;

  prizeMessage.style.display = "block";
}

/* GIRAR ROLETA */
spinBtn.addEventListener("click", ()=>{

  if(isSpinning || hasSpun) return;

  isSpinning = true;

  const spins = 5;
  const randomAngle = Math.random() * 360;

  const targetRotation =
  360 * spins + randomAngle;

  currentRotation += targetRotation;

  wheel.style.transition =
  `transform ${spinDurationMs/1000}s cubic-bezier(0.33,1,0.68,1)`;

  wheel.style.transform =
  `rotate(${currentRotation}deg)`;

  setTimeout(()=>{

    localStorage.setItem(
      "roleta_hamburguer_girada",
      "true"
    );

    localStorage.setItem(
      "roleta_hamburguer_angulo",
      currentRotation % 360
    );

    prizeMessage.style.display = "block";

    spinBtn.disabled = true;
    spinBtn.style.opacity = 0.5;

    isSpinning = false;
    hasSpun = true;

  }, spinDurationMs);

});

</script>

</body>
</html>
